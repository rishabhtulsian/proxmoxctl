name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Print toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Verify CLI and local integration scripts
        run: ./script/build_and_run.sh --verify

      - name: Interactive pipe smoke
        run: printf 'help\nexit\n' | .build/debug/proxmoxctl interactive
